<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cartify</title>
    <link rel="stylesheet" href="../header.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <img src="../assets/logo.png" height=65px alt="logo" >
    
    <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div class="nav-icons">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
    </div>
</header>

    <main class="login-page-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <a href="../index.html" class="auth-logo">Cartify</a>
                
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Log in to check your cart and explore new deals.</p>
                
                <form id="loginForm" class="auth-form" action="login-process.php" method="POST">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="email@example.com" required autocomplete="email">
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                                <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-utilities">
                        <label class="checkbox-container">
                            <input type="checkbox" name="remember">
                            <span class="custom-checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="submit-btn">Log In</button>
                </form>
                
                <div class="auth-footer">
                    <p>Don't have an account? <a href="../Signup/index.html">Sign up for free</a></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        
        passwordToggle.addEventListener('click', () => {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            passwordToggle.classList.toggle('visible');
        });
    </script>
</body>
</html>
